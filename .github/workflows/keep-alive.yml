name: Supabase Keep Alive

on:
  schedule:
    # Runs at 00:00 UTC every 3 days
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # Install only what's needed for the script to run fast
        run: npm install @supabase/supabase-js dotenv

      - name: Run Keep-Alive Script
        env:
          # Make sure to add these to your GitHub Repository Secrets
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: node scripts/keep-alive.js
